name: Sync Leetcode

on:
  workflow_dispatch:
  schedule:
  - cron: "30 16 * * *" # Runs every day at 10:00 PM IST

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Sync
      uses: joshcai/leetcode-sync@main
        with:
          github-token: ${{ github.token }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          verbose: true
          
